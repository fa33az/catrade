<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Halaman Tidak Ditemukan - catrade</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-black: #1a1a1a;
      --color-yellow: #fee440;
      --color-pink: #ff007f;
      --color-bg: #f4f3ef;
      --border-thick: 4px solid var(--color-black);
      --box-shadow: 6px 6px 0px 0px var(--color-black);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--color-bg);
      color: var(--color-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Grid Background Effect */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(to right, rgba(26, 26, 26, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(26, 26, 26, 0.05) 1px, transparent 1px);
      background-size: 24px 24px;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      background-color: #ffffff;
      border: var(--border-thick);
      box-shadow: var(--box-shadow);
      padding: 3rem 2rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      transform: rotate(-1deg);
      transition: transform 0.2s ease;
    }

    .container:hover {
      transform: rotate(0deg);
    }

    .error-code {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      color: var(--color-pink);
      text-shadow: 4px 4px 0px var(--color-black);
      margin-bottom: 1rem;
      position: relative;
      display: inline-block;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      top: -2px;
      left: -2px;
      color: var(--color-yellow);
      text-shadow: none;
      z-index: -1;
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      color: rgba(26, 26, 26, 0.8);
      font-weight: 700;
    }

    .btn-home {
      display: inline-block;
      text-decoration: none;
      color: var(--color-black);
      background-color: var(--color-yellow);
      border: var(--border-thick);
      box-shadow: 4px 4px 0px 0px var(--color-black);
      padding: 0.8rem 2rem;
      font-weight: 900;
      font-size: 1.1rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-home:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px 0px var(--color-black);
      background-color: var(--color-pink);
      color: #ffffff;
    }

    .btn-home:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px var(--color-black);
    }

    /* Floating Brutalist shapes */
    .shape {
      position: absolute;
      border: var(--border-thick);
      z-index: 1;
    }

    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--color-yellow);
      top: 10%;
      right: 15%;
    }

    .triangle {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 70px solid var(--color-pink);
      bottom: 15%;
      left: 10%;
      transform: rotate(25deg);
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 6rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="shape circle"></div>
  <div class="shape triangle"></div>
  
  <div class="container">
    <div class="error-code">404</div>
    <h1>Arah Transaksi Salah!</h1>
    <p>Halaman yang lo cari ga ada gng, atau mungkin chart-nya udah kena likuidasi duluan.</p>
    <a href="/" class="btn-home">Kembali ke Beranda</a>
  </div>
</body>
</html>
